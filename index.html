<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Franchise — My Beers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--bg2:#fff;--bg3:#f0eeea;--bg4:#e8e6e1;
  --tx:#1a1a1a;--tx2:#666;--tx3:#999;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);
  --green:#1D9E75;--green-bg:#EAF3DE;--green-tx:#27500A;
  --amber:#EF9F27;--amber-bg:#FAEEDA;--amber-tx:#633806;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-tx:#791F1F;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-tx:#0C447C;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-tx:#3C3489;
  --pink:#D4537E;--pink-bg:#FBEAF0;--pink-tx:#72243E;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2a2a28;--bg4:#333330;
  --tx:#f0eeea;--tx2:#aaa;--tx3:#666;--bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.18);
  --green-bg:#085041;--green-tx:#9FE1CB;--amber-bg:#633806;--amber-tx:#FAC775;
  --red-bg:#501313;--red-tx:#F7C1C1;--blue-bg:#042C53;--blue-tx:#B5D4F4;
  --purple-bg:#26215C;--purple-tx:#CECBF6;--pink-bg:#4B1528;--pink-tx:#F4C0D1;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}

/* LOGIN */
.login-wrap{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1000}
.login-card{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--rl);padding:2.5rem;width:340px;display:flex;flex-direction:column;gap:1.25rem}
.login-logo{font-size:20px;font-weight:700;text-align:center;color:var(--tx)}
.login-logo small{font-size:12px;font-weight:400;color:var(--tx2);display:block;margin-top:4px}
.login-err{background:var(--red-bg);color:var(--red-tx);border-radius:var(--r);padding:8px 12px;font-size:12px;display:none}

/* APP */
.app{display:flex;min-height:100vh;display:none}
.sidebar{width:230px;background:var(--bg2);border-right:0.5px solid var(--bd);padding:1rem;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.logo{font-size:15px;font-weight:600;padding-bottom:1rem;border-bottom:0.5px solid var(--bd);margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center}
.logo small{font-size:11px;font-weight:400;color:var(--tx2);display:block;margin-top:2px}
.ns{font-size:10px;color:var(--tx3);padding:10px 10px 4px;text-transform:uppercase;letter-spacing:.06em}
.ni{padding:7px 10px;border-radius:var(--r);font-size:13px;cursor:pointer;color:var(--tx2)}
.ni:hover{background:var(--bg3)}
.ni.active{background:var(--bg3);color:var(--tx);font-weight:500}
.pdv-item{padding:6px 10px;border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdv-item:hover{background:var(--bg3)}
.pdv-item.active{background:var(--bg3);color:var(--tx);font-weight:500}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.main{flex:1;padding:1.5rem;overflow-y:auto;display:flex;flex-direction:column;gap:1.25rem;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.topbar h1{font-size:18px;font-weight:600}
.card{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem}
.ct{font-size:13px;font-weight:600;margin-bottom:1rem}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.kc{background:var(--bg3);border-radius:var(--r);padding:.9rem}
.kl{font-size:11px;color:var(--tx2);margin-bottom:4px}
.kv{font-size:21px;font-weight:600;color:var(--tx)}
.ks{font-size:11px;color:var(--tx3);margin-top:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:9px;font-size:11px;font-weight:500}
.bg{background:var(--green-bg);color:var(--green-tx)}
.ba{background:var(--amber-bg);color:var(--amber-tx)}
.br{background:var(--red-bg);color:var(--red-tx)}
.bb{background:var(--blue-bg);color:var(--blue-tx)}
.bpu{background:var(--purple-bg);color:var(--purple-tx)}
.bpi{background:var(--pink-bg);color:var(--pink-tx)}
.fl{display:flex;flex-direction:column;gap:10px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
input,select,textarea{font-size:13px;width:100%;padding:7px 9px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);outline:none}
input:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:60px}
.btn{font-size:12px;padding:7px 14px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;color:var(--tx);cursor:pointer;font-weight:500}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn-primary:hover{opacity:.9}
.btn-danger{color:var(--red);border-color:var(--red-bg)}
.btn-sm{font-size:11px;padding:4px 10px}
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{font-size:12px;padding:5px 12px;border-radius:var(--r);cursor:pointer;border:0.5px solid transparent;color:var(--tx2)}
.tab.active{border-color:var(--bd2);background:var(--bg3);color:var(--tx);font-weight:500}
.sep{height:0.5px;background:var(--bd);margin:.75rem 0}
.row{display:flex;gap:1.25rem;align-items:flex-start;flex-wrap:wrap}
.tbl-wrap{overflow-x:auto}
table.t{width:100%;border-collapse:collapse;font-size:12px}
table.t th{text-align:center;font-size:11px;font-weight:500;color:var(--tx2);padding:0 8px 8px;border-bottom:0.5px solid var(--bd);white-space:nowrap}
table.t td{padding:9px 8px;border-bottom:0.5px solid var(--bd);color:var(--tx);vertical-align:middle;text-align:center}
table.t td.tal{text-align:left}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:var(--bg3)}
.empty{font-size:13px;color:var(--tx2);padding:.5rem 0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.info-box{background:var(--blue-bg);color:var(--blue-tx);border-radius:var(--r);padding:.75rem 1rem;font-size:12px;line-height:1.6}
.warn-box{background:var(--amber-bg);color:var(--amber-tx);border-radius:var(--r);padding:.75rem 1rem;font-size:12px;line-height:1.6}
.chart-wrap{position:relative;width:100%}
.token-field{font-family:monospace;font-size:11px}
.logout-btn{font-size:11px;color:var(--tx3);cursor:pointer;padding:3px 7px;border-radius:var(--r);border:0.5px solid var(--bd)}
.logout-btn:hover{background:var(--bg3)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">RS Franchise<small>My Beers — Suivi performances</small></div>
    <div class="login-err" id="login-err">Identifiant ou mot de passe incorrect.</div>
    <div class="fl">
      <div><label>Identifiant</label><input id="l-user" type="text" placeholder="Votre identifiant" autocomplete="username"></div>
      <div><label>Mot de passe</label><input id="l-pass" type="password" placeholder="Votre mot de passe" autocomplete="current-password"></div>
      <button class="btn btn-primary" onclick="doLogin()" style="width:100%;padding:10px">Se connecter</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo">
      <div>RS Franchise<small id="role-label"></small></div>
      <span class="logout-btn" onclick="doLogout()">Déco.</span>
    </div>
    <div class="ns">Navigation</div>
    <div class="ni active" data-v="accueil">Accueil</div>
    <div class="ni" data-v="config" id="nav-config">Gérer les établissements</div>
    <div class="ns">Établissements</div>
    <div id="pdv-list"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
// ── AUTH ───────────────────────────────────────────────────────────────────
const USERS = {
  'admin':     { pass: 'MyBeers2025!', role: 'admin' },
  'animateur': { pass: 'Anim2025#',    role: 'animateur' }
}

let currentRole = null

function doLogin() {
  const u = document.getElementById('l-user').value.trim().toLowerCase()
  const p = document.getElementById('l-pass').value
  const err = document.getElementById('login-err')
  const user = USERS[u]
  if(!user || user.pass !== p) { err.style.display='block'; return }
  err.style.display='none'
  currentRole = user.role
  localStorage.setItem('rsf_session', JSON.stringify({role: currentRole, ts: Date.now()}))
  showApp()
}

function doLogout() {
  localStorage.removeItem('rsf_session')
  currentRole = null
  document.getElementById('app').style.display='none'
  document.getElementById('login-wrap').style.display='flex'
  document.getElementById('l-user').value=''
  document.getElementById('l-pass').value=''
}

// ── SUPABASE CONFIG ────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://kndaguwcpypcmjpkxpbw.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZGFndXdjcHlwY21qcGt4cGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NDk2OTUsImV4cCI6MjA5MjMyNTY5NX0.GIcXljp3p4YHIJI5vWzc_vY8xglu_rhit1cWZ1U5WHo'

async function supabaseFetch(path, options={}) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    },
    ...options
  })
  if(!r.ok) throw new Error(`Supabase ${r.status}`)
  return r.json()
}

async function loadConfigFromSupabase() {
  try {
    const data = await supabaseFetch('etablissements?select=*&order=nom')
    return data || []
  } catch(e) {
    console.warn('Erreur Supabase:', e.message)
    return null
  }
}

async function saveConfigToSupabase(pdv) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/etablissements`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(pdv)
    })
    if(!r.ok) {
      const err = await r.text()
      console.warn('Erreur sauvegarde Supabase:', r.status, err)
      return false
    }
    return true
  } catch(e) {
    console.warn('Erreur sauvegarde Supabase:', e.message)
    return false
  }
}

async function deleteConfigFromSupabase(id) {
  try {
    await supabaseFetch(`etablissements?id=eq.${id}`, { method: 'DELETE' })
    return true
  } catch(e) { return false }
}

let sheetConfig = null

async function showApp() {
  document.getElementById('login-wrap').style.display='none'
  document.getElementById('app').style.display='flex'
  document.getElementById('role-label').textContent = currentRole === 'admin' ? 'Admin' : 'Animateur'
  const cfgNav = document.getElementById('nav-config')
  if(currentRole !== 'admin') cfgNav.style.display='none'
  else cfgNav.style.display='block'

  document.getElementById('pdv-list').innerHTML = '<div style="font-size:11px;color:var(--tx3);padding:6px 10px">Chargement...</div>'
  const fromSupabase = await loadConfigFromSupabase()
  sheetConfig = (fromSupabase && fromSupabase.length > 0) ? fromSupabase : DB.cfg
  buildSidebar(null)
  renderAccueil()
}

// Vérifier session existante
;(function(){
  const s = localStorage.getItem('rsf_session')
  if(s){ try{ const j=JSON.parse(s); if(j.role && Date.now()-j.ts < 8*3600000){ currentRole=j.role; showApp(); return } }catch(e){} }
  document.getElementById('login-wrap').style.display='flex'
})()

document.getElementById('l-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin() })

// ── STORAGE ────────────────────────────────────────────────────────────────
const DB = {
  get cfg(){ try{ return JSON.parse(localStorage.getItem('rsf_cfg')||'[]') }catch(e){ return [] } },
  set cfg(v){ localStorage.setItem('rsf_cfg', JSON.stringify(v)) },
  getCache(id,t){ try{ const r=JSON.parse(localStorage.getItem(`rsf_c_${id}_${t}`)||'null'); if(!r) return null; if(Date.now()-r.ts > 7*86400000) return null; return r.d }catch(e){ return null } },
  setCache(id,t,d){ localStorage.setItem(`rsf_c_${id}_${t}`, JSON.stringify({ts:Date.now(),d})) },
  clearCache(id){ Object.keys(localStorage).filter(k=>k.startsWith(`rsf_c_${id}`)).forEach(k=>localStorage.removeItem(k)) }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
const fmt = n => (isNaN(n)||n===null||n===undefined) ? '—' : Number(n).toLocaleString('fr-FR')
const fmtE = n => (isNaN(n)||!n) ? '—' : Number(n).toFixed(2)+' €'
const fmtD = s => s ? new Date(s).toLocaleDateString('fr-FR') : '—'
const getAction = (actions, type) => { const a=(actions||[]).find(x=>x.action_type===type); return a ? parseInt(a.value)||0 : 0 }

async function fetchMeta(endpoint, token) {
  const r = await fetch(`https://graph.facebook.com/v25.0/${endpoint}${endpoint.includes('?')?'&':'?'}access_token=${token}`)
  const j = await r.json()
  if(j.error) throw new Error(j.error.message)
  return j
}

// ── TYPE DETECTION ─────────────────────────────────────────────────────────
const TYPE_DEFS = [
  {label:'Apéro Quiz',    keys:['apéro quiz','apero quiz','quiz','mardi']},
  {label:'Apéro Concert', keys:['apéro concert','apero concert','concert']},
  {label:'Beer Pong',     keys:['beer pong','pong','championnat']},
  {label:'Fléchettes',    keys:['fléchettes','flechettes','fléchette','flechette','tournoi de fl','🎯']},
  {label:'Karaoke',       keys:['karaoké','karaoke']},
  {label:'SBK',           keys:['sbk']},
  {label:'Open Mix',      keys:['open mix']},
  {label:'Club Mix',      keys:['club mix']},
  {label:'Crush',         keys:['crush','célib','celib']},
  {label:'Sport',         keys:['vs ','versus','match','foot','rugby']},
  {label:'Comedy Club',   keys:['stand-up','stand up','comedy']},
  {label:'Flash Tattoo',  keys:['tattoo','tatou','tatouage']},
  {label:'Poker',         keys:['poker']},
]

// Couleurs par type (badge class)
const TYPE_COLORS = {
  'Apéro Quiz':    'ba', 'Apéro Concert': 'ba', 'Beer Pong':   'ba',
  'Club Mix':      'ba', 'Fléchettes':    'ba', 'Open Mix':    'ba',
  'Karaoke':       'bg', 'Sport':         'bg', 'Crush':       'bg',
  'SBK':           'bg', 'Comedy Club':   'bg', 'Flash Tattoo':'bg', 'Poker': 'bg',
  'Soirée':        'br',
  'Divers':        'bb',
}

// Durée minimale en vert par type
const DUREE_MIN = {
  'Apéro Concert':5,'Apéro Quiz':4,'Club Mix':5,'Open Mix':5,'Fléchettes':4,'SBK':4,
  'Crush':4,'Sport':2,'Karaoke':5,'Comedy Club':4,'Divers':2,'Poker':5,
  'Beer Pong':7,'Flash Tattoo':4,
}

function normalizeUnicode(s) {
  const ranges = [
    [0x1D400,0x1D419,65],[0x1D41A,0x1D433,97],[0x1D434,0x1D44D,65],[0x1D44E,0x1D467,97],
    [0x1D468,0x1D481,65],[0x1D482,0x1D49B,97],[0x1D49C,0x1D4B5,65],[0x1D4B6,0x1D4CF,97],
    [0x1D4D0,0x1D4E9,65],[0x1D4EA,0x1D503,97],[0x1D504,0x1D51D,65],[0x1D51E,0x1D537,97],
    [0x1D538,0x1D551,65],[0x1D552,0x1D56B,97],[0x1D56C,0x1D585,65],[0x1D586,0x1D59F,97],
    [0x1D5A0,0x1D5B9,65],[0x1D5BA,0x1D5D3,97],[0x1D5D4,0x1D5ED,65],[0x1D5EE,0x1D607,97],
    [0x1D608,0x1D621,65],[0x1D622,0x1D63B,97],[0x1D63C,0x1D655,65],[0x1D656,0x1D66F,97],
    [0x1D670,0x1D689,65],[0x1D68A,0x1D6A3,97],
  ]
  return s.normalize('NFKD').replace(/[\u{1D400}-\u{1D7FF}]/gu, c => {
    const cp = c.codePointAt(0)
    for(const [start,end,base] of ranges){ if(cp>=start&&cp<=end) return String.fromCharCode(cp-start+base) }
    return c
  })
}

function detectType(name) {
  const n = normalizeUnicode(name||'').toLowerCase()
  const found = TYPE_DEFS.find(t=>t.keys.some(k=>n.includes(k)))
  return found ? found.label : null
}

function computeTypes(rows) {
  // 1er passage
  const result = rows.map(r => {
    const isFriday = r.date_stop ? new Date(r.date_stop).getDay()===5 : false
    const found = detectType(r.campaign_name||'')
    let type = found || (isFriday ? 'Soirée' : 'Divers')
    // Règle spéciale : Célib détecté mais boost finit un vendredi → Soirée
    const n = normalizeUnicode(r.campaign_name||'').toLowerCase()
    if(type === 'Crush' && isFriday && (n.includes('célib') || n.includes('celib'))) {
      type = 'Soirée'
    }
    return {...r, _type: type}
  })
  // 2ème passage héritage
  const map = {}
  result.forEach(r => { if(r._type!=='Divers' && r.date_start && r.date_stop) map[r.date_start+'_'+r.date_stop]=r._type })
  result.forEach(r => { if(r._type==='Divers' && r.date_start && r.date_stop){ const k=r.date_start+'_'+r.date_stop; if(map[k]) r._type=map[k] } })
  return result
}

function dureeBadge(duree, type, objectif) {
  if(duree==='—') return '<span style="color:var(--tx3)">—</span>'
  let min = DUREE_MIN[type]
  if(type==='Soirée') min = objectif==='Événement' ? 14 : 5
  if(min === undefined) return `<span class="badge bb">${duree} jours</span>`
  const ok = duree >= min
  return `<span class="badge ${ok?'bg':'br'}">${duree} jours</span>`
}

function objBadge(objLabel) {
  const good = ['Interaction','Trafic','Événement'].includes(objLabel)
  return `<span class="badge ${good?'bg':'br'}">${objLabel}</span>`
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function buildSidebar(activePdv) {
  const cfg = sheetConfig || DB.cfg
  const el = document.getElementById('pdv-list')
  if(!cfg.length){ el.innerHTML='<div style="font-size:11px;color:var(--tx3);padding:6px 10px">Aucun établissement</div>'; return }
  el.innerHTML = cfg.map(p => {
    const ok = p.fb_token && p.ad_account_id
    return `<div class="pdv-item${activePdv===p.id?' active':''}" data-pdv="${p.id}" onclick="navPDV('${p.id}')">
      <span class="sdot" style="background:${ok?'var(--green)':'var(--amber)'}"></span>${p.nom}
    </div>`
  }).join('')
}

// ── NAV ────────────────────────────────────────────────────────────────────
function nav(v) {
  document.querySelectorAll('.ni[data-v]').forEach(e=>e.classList.toggle('active',e.dataset.v===v))
  document.querySelectorAll('.pdv-item').forEach(e=>e.classList.remove('active'))
  if(v==='accueil') renderAccueil()
  else if(v==='config') renderConfig()
}
function navPDV(id) {
  document.querySelectorAll('.ni[data-v]').forEach(e=>e.classList.remove('active'))
  document.querySelectorAll('.pdv-item').forEach(e=>e.classList.toggle('active',e.dataset.pdv===id))
  buildSidebar(id)
  renderDash(id, false)
}
document.querySelectorAll('.ni[data-v]').forEach(el=>el.addEventListener('click',()=>nav(el.dataset.v)))

// ── ACCUEIL ────────────────────────────────────────────────────────────────
function renderAccueil() {
  const cfg = sheetConfig || DB.cfg
  document.getElementById('main').innerHTML = `
    <div class="topbar"><h1>Tableau de bord réseau</h1></div>
    <div class="kgrid">
      <div class="kc"><div class="kl">Établissements configurés</div><div class="kv">${cfg.length}<span style="font-size:13px;color:var(--tx2)"> / 50</span></div></div>
      <div class="kc"><div class="kl">Accès complets</div><div class="kv" style="color:var(--green)">${cfg.filter(p=>p.fb_token&&p.ad_account_id).length}</div><div class="ks">Meta + compte pub</div></div>
      <div class="kc"><div class="kl">Accès partiels</div><div class="kv" style="color:var(--amber)">${cfg.filter(p=>p.fb_token&&!p.ad_account_id).length}</div><div class="ks">Page seulement</div></div>

// ── LOAD DATA ──────────────────────────────────────────────────────────────
async function loadAds(pdv, force, period) {
  if(!pdv.ad_account_id || !pdv.fb_token) return null
  const cacheKey = 'ads_' + (period||'30d')
  if(!force){ const c=DB.getCache(pdv.id, cacheKey); if(c) return c }
  try {
    let campaigns=[], curl=`${pdv.ad_account_id}/campaigns?fields=id,name,start_time,stop_time,status,effective_status,promoted_object{page_id}&limit=100`
    while(curl) {
      const d = await fetchMeta(curl, pdv.fb_token)
      campaigns = campaigns.concat(d.data||[])
      curl = d.paging?.next ? d.paging.next.replace(/https:\/\/graph\.facebook\.com\/v[\d.]+\//,'').replace(/&access_token=[^&]+/,'') : null
      if(campaigns.length > 1000) break
    }
    // Filtrer par page_id si configuré et si promoted_object disponible
    const filterPageId = pdv.filter_page_id || pdv.fb_page_id
    if(filterPageId) {
      const hasPromotedObject = campaigns.some(c => c.promoted_object?.page_id)
      if(hasPromotedObject) {
        campaigns = campaigns.filter(c => c.promoted_object?.page_id === filterPageId)
      }
    }
    const campMap = {}
    campaigns.forEach(c=>{ campMap[c.id] = c })

    const preset = period==='max' ? 'maximum' : 'last_30d'
    let insights=[], iurl=`${pdv.ad_account_id}/insights?fields=campaign_id,objective,spend,reach,impressions,actions&date_preset=${preset}&level=campaign&limit=50`
    while(iurl) {
      const d = await fetchMeta(iurl, pdv.fb_token)
      insights = insights.concat(d.data||[])
      iurl = d.paging?.next ? d.paging.next.replace(/https:\/\/graph\.facebook\.com\/v[\d.]+\//,'').replace(/&access_token=[^&]+/,'') : null
      if(insights.length > 500) break
    }

    const merged = insights.map(r => {
      const camp = campMap[r.campaign_id] || {}
      return {
        ...r,
        campaign_name: camp.name || r.campaign_id || '—',
        date_start: camp.start_time ? camp.start_time.split('T')[0] : null,
        date_stop: camp.stop_time ? camp.stop_time.split('T')[0] : null,
        status: camp.status || '—',
        effective_status: camp.effective_status || camp.status || '—'
      }
    })

    // Récupérer les dépenses d'hier pour détecter les campagnes actives non diffusées
    try {
      const yesterday = await fetchMeta(`${pdv.ad_account_id}/insights?fields=campaign_id,spend&date_preset=yesterday&level=campaign&limit=200`, pdv.fb_token)
      const yesterdaySpend = new Set((yesterday.data||[]).filter(r=>parseFloat(r.spend)>0).map(r=>r.campaign_id))
      const today = new Date(); today.setHours(0,0,0,0)
      merged.forEach(r => {
        const stopDate = r.date_stop ? new Date(r.date_stop) : null
        const isCurrentlyActive = r.status==='ACTIVE' && stopDate && stopDate >= today
        if(isCurrentlyActive && !yesterdaySpend.has(r.campaign_id)) {
          r.effective_status = 'NOT_DELIVERING'
        }
      })
    } catch(e) { console.warn('Impossible de vérifier les dépenses hier:', e.message) }

    // Trier du plus proche d'aujourd'hui au plus ancien
    merged.sort((a,b) => (b.date_start||'').localeCompare(a.date_start||''))
    DB.setCache(pdv.id, cacheKey, merged); return merged
  } catch(e){ return {error:e.message} }
}

async function loadPage(pdv, force) {
  if(!pdv.fb_page_id || !pdv.fb_token) return null
  if(!force){ const c=DB.getCache(pdv.id,'page'); if(c) return c }
  try {
    const d = await fetchMeta(`${pdv.fb_page_id}?fields=name,fan_count,followers_count`, pdv.fb_token)
    DB.setCache(pdv.id,'page',d); return d
  } catch(e){ return {error:e.message} }
}

async function loadGMB(pdv, force) {
  if(!pdv.gmb_place_id || !pdv.gmb_api_key) return null
  if(!force){ const c=DB.getCache(pdv.id,'gmb'); if(c) return c }
  try {
    const r = await fetch(`https://maps.googleapis.com/maps/api/place/details/json?place_id=${pdv.gmb_place_id}&fields=name,rating,user_ratings_total,reviews&key=${pdv.gmb_api_key}`)
    const j = await r.json()
    if(j.status!=='OK') throw new Error(j.status)
    DB.setCache(pdv.id,'gmb',j.result); return j.result
  } catch(e){ return {error:e.message} }
}

// ── FILTERING ──────────────────────────────────────────────────────────────
function getFiltered(data30d, dataAll) {
  if(!dataAll || !Array.isArray(dataAll)) return []
  if(currentPeriod==='30d') return (data30d && Array.isArray(data30d) && !data30d.error) ? data30d : []
  if(currentPeriod==='max') return dataAll
  if(currentPeriod.startsWith('year-')) {
    const fy = parseInt(currentPeriod.replace('year-',''))
    return dataAll.filter(r => r.date_start && new Date(r.date_start).getFullYear()===fy)
  }
  if(currentPeriod.includes('-')) {
    const [fy,fm] = currentPeriod.split('-').map(Number)
    return dataAll.filter(r => { if(!r.date_start) return false; const d=new Date(r.date_start); return d.getFullYear()===fy && d.getMonth()===fm })
  }
  return dataAll
}

// ── TAB ADS ────────────────────────────────────────────────────────────────
function renderAdsTab(data, pdv, allData) {
  if(!pdv.ad_account_id||!pdv.fb_token) return `<div class="card"><div class="warn-box">Compte publicitaire non configuré.</div></div>`
  if(!data) return `<div class="card"><p class="empty">Aucune donnée.</p></div>`
  if(data.error) return `<div class="card"><div class="warn-box"><strong>Erreur API :</strong> ${data.error}</div></div>`

  const sourceForSelect = (allData && Array.isArray(allData) && !allData.error) ? allData : data
  const yearMonths = {}
  sourceForSelect.forEach(r => {
    if(!r.date_start) return
    const d=new Date(r.date_start); const y=d.getFullYear(); const m=d.getMonth()
    if(!yearMonths[y]) yearMonths[y]=new Set()
    yearMonths[y].add(m)
  })
  const monthNames=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre']
  const yearOpts = Object.keys(yearMonths).sort((a,b)=>b-a).map(y=>`
    <option value="year-${y}">${y} — Toute l'année</option>
    ${[...yearMonths[y]].sort((a,b)=>b-a).map(m=>`<option value="${y}-${m}">&nbsp;&nbsp;&nbsp;${monthNames[m]}</option>`).join('')}
  `).join('')

  const isCustom = currentPeriod!=='30d' && currentPeriod!=='max'
  let customLabel = 'Personnalisé'
  if(isCustom && currentPeriod.startsWith('year-')) customLabel = currentPeriod.replace('year-','')+' — Toute l\'année'
  else if(isCustom && currentPeriod.includes('-')){ const [fy,fm]=currentPeriod.split('-').map(Number); customLabel=`${monthNames[fm]} ${fy}` }

  let periodLabel2 = '30 derniers jours'
  if(currentPeriod==='max') periodLabel2='Toute la période'
  else if(isCustom) periodLabel2=customLabel

  const periodSel = `<div style="display:flex;gap:6px;margin-bottom:1rem;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--tx2)">Période :</span>
    <button class="btn btn-sm${currentPeriod==='30d'?' btn-primary':''}" onclick="changePeriod('${pdv.id}','30d')">30 derniers jours</button>
    <button class="btn btn-sm${currentPeriod==='max'?' btn-primary':''}" onclick="changePeriod('${pdv.id}','max')">Toute la période</button>
    <div style="position:relative;display:inline-block">
      <button class="btn btn-sm${isCustom?' btn-primary':''}" onclick="document.getElementById('custom-sel-${pdv.id}').style.display=document.getElementById('custom-sel-${pdv.id}').style.display==='none'?'block':'none'">${isCustom?customLabel:'Personnalisé'} ▾</button>
      <div id="custom-sel-${pdv.id}" style="display:none;position:absolute;top:100%;left:0;z-index:100;background:var(--bg2);border:0.5px solid var(--bd2);border-radius:var(--r);padding:4px 0;min-width:180px;margin-top:4px">
        <select size="${Object.values(yearMonths).reduce((a,s)=>a+s.size,0) + Object.keys(yearMonths).length}" style="border:none;background:transparent;width:100%;font-size:12px;outline:none;padding:0 8px" onchange="changePeriod('${pdv.id}',this.value);document.getElementById('custom-sel-${pdv.id}').style.display='none'">
          ${yearOpts}
        </select>
      </div>
    </div>
  </div>`

  const filtered = getFiltered(data, allData||data)
  if(!filtered.length) return periodSel+`<div class="card"><p class="empty">Aucune publicité sur la période sélectionnée.</p></div>`

  const rows = computeTypes(filtered)
  const totalSpend=rows.reduce((a,r)=>a+(parseFloat(r.spend)||0),0)
  const totalReach=rows.reduce((a,r)=>a+(parseInt(r.reach)||0),0)
  const totalImpr=rows.reduce((a,r)=>a+(parseInt(r.impressions)||0),0)
  const totalReact=rows.reduce((a,r)=>a+getAction(r.actions,'post_reaction'),0)
  const totalEng=rows.reduce((a,r)=>a+getAction(r.actions,'post_engagement'),0)
  const totalShares=rows.reduce((a,r)=>a+getAction(r.actions,'post'),0)
  const cpm=totalImpr>0?(totalSpend/totalImpr*1000):0
  const cpr=totalReach>0?(totalSpend/totalReach*1000):0

  const objMap={'OUTCOME_ENGAGEMENT':'Interaction','OUTCOME_AWARENESS':'Notoriété','LINK_CLICKS':'Trafic','OUTCOME_TRAFFIC':'Trafic','MESSAGES':'Messages','REACH':'Couverture','EVENT_RESPONSES':'Événement'}
  const resultMap_fn=(r,obj)=>{
    const m={'OUTCOME_ENGAGEMENT':getAction(r.actions,'post_engagement'),'LINK_CLICKS':getAction(r.actions,'link_click'),'OUTCOME_TRAFFIC':getAction(r.actions,'link_click'),'MESSAGES':getAction(r.actions,'onsite_conversion.messaging_conversation_started_7d'),'REACH':parseInt(r.reach)||0,'EVENT_RESPONSES':getAction(r.actions,'rsvp'),'OUTCOME_AWARENESS':parseInt(r.reach)||0}
    return m[obj]!==undefined ? m[obj] : '—'
  }

  const tableRows = rows.map(r=>{
    const isIG = (r.campaign_name||'').toLowerCase().includes('instagram')
    const name = (r.campaign_name||'—').replace(/Publication\s*:\s*«\s*/,'').replace(/»\s*$/,'').replace(/Publication Instagram\s*:\s*/,'').replace(/Évènement\s*:\s*/,'').trim().substring(0,50)
    const type = r._type
    const tc = TYPE_COLORS[type]||'bb'
    const objLabel = objMap[r.objective]||r.objective||'—'
    const resultVal = resultMap_fn(r, r.objective)
    const duree = r.date_start&&r.date_stop ? Math.round((new Date(r.date_stop)-new Date(r.date_start))/(86400000)) : '—'
    // Statut de la campagne
    const effStatus = r.effective_status || r.status || ''
    const today = new Date(); today.setHours(0,0,0,0)
    const stopDate = r.date_stop ? new Date(r.date_stop) : null
    const isExpired = stopDate && stopDate < today
    const isAnomalie = ['PAUSED','NOT_DELIVERING','WITH_ISSUES','DISAPPROVED','PENDING_REVIEW'].includes(effStatus)
    const isActive = !isAnomalie && !isExpired && effStatus === 'ACTIVE'
    const statutBadge = isAnomalie
      ? `<span class="badge br">Anomalie</span>`
      : isActive
        ? `<span class="badge bg">En cours</span>`
        : `<span style="font-size:11px;color:var(--tx3)">Terminé</span>`
    const rowBg = isAnomalie
      ? 'background:rgba(226,75,74,0.06)'
      : isActive
        ? 'background:rgba(29,158,117,0.06)'
        : ''
    // Badge plateforme
    const platBadge = isIG
      ? `<span class="badge bpi">Instagram</span>`
      : `<span class="badge bb">Facebook</span>`
    return `<tr style="${rowBg}">
      <td>${statutBadge}</td>
      <td>${platBadge}</td>
      <td class="tal" title="${r.campaign_name||''}">${name}${(r.campaign_name||'').length>50?'…':''}</td>
      <td><span class="badge ${tc}">${type}</span></td>
      <td>${fmtD(r.date_start)}</td>
      <td>${fmtD(r.date_stop)}</td>
      <td>${dureeBadge(duree, type, objLabel)}</td>
      <td>${fmt(r.reach)}</td>
      <td>${fmt(getAction(r.actions,'post_interaction_net'))}</td>
      <td>${fmtE(r.spend)}</td>
      <td>${objBadge(objLabel)}</td>
      <td style="font-weight:500">${fmt(resultVal)}</td>
      <td>${fmt(getAction(r.actions,'post'))}</td>
      <td>${fmt(getAction(r.actions,'post_reaction'))}</td>
    </tr>`
  }).join('')

  return `${periodSel}
    <div class="kgrid" style="margin-bottom:1.25rem">
      <div class="kc"><div class="kl">Budget (${periodLabel2})</div><div class="kv">${fmtE(totalSpend)}</div></div>
      <div class="kc"><div class="kl">Couverture</div><div class="kv">${fmt(totalReach)}</div></div>
      <div class="kc"><div class="kl">Impressions</div><div class="kv">${fmt(totalImpr)}</div></div>
      <div class="kc"><div class="kl">Réactions</div><div class="kv">${fmt(totalReact)}</div></div>
      <div class="kc"><div class="kl">Engagements</div><div class="kv">${fmt(totalEng)}</div></div>
      <div class="kc"><div class="kl">Partages</div><div class="kv">${fmt(totalShares)}</div></div>
      <div class="kc"><div class="kl">CPM</div><div class="kv">${fmtE(cpm)}</div></div>
      <div class="kc"><div class="kl">CPR</div><div class="kv">${fmtE(cpr)}</div></div>
    </div>
    <div class="card" style="margin-bottom:1.25rem">
      <div class="ct">Budget par type — ${periodLabel2}</div>
      <div class="chart-wrap" style="height:220px"><canvas id="ads-chart" role="img" aria-label="Budget par type">Données publicitaires.</canvas></div>
    </div>
    <div class="card">
      <div class="ct">Publications boostées — ${periodLabel2}</div>
      <div class="tbl-wrap"><table class="t">
        <thead><tr><th>Statut</th><th>Plateforme</th><th style="text-align:left;min-width:180px">Publication</th><th>Type</th><th>Début</th><th>Fin</th><th>Durée</th><th>Couverture</th><th>Interactions</th><th>Budget</th><th>Objectif</th><th>Résultat</th><th>Partages</th><th>Réactions</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>
    </div>`
}

function drawAdsChart(rows) {
  const ctx = document.getElementById('ads-chart'); if(!ctx) return
  // Agréger budget par type + date de fin
  const byType = {}
  rows.forEach(r => {
    const type = r._type || 'Divers'
    const label = `${type}\n${fmtD(r.date_stop)}`
    if(!byType[label]) byType[label] = {type, spend:0}
    byType[label].spend += parseFloat(r.spend)||0
  })
  const labels = Object.keys(byType)
  const values = labels.map(l=>parseFloat(byType[l].spend.toFixed(2)))
  const colorMap = {
    'Apéro Quiz':'#EF9F27','Apéro Concert':'#EF9F27','Beer Pong':'#EF9F27',
    'Club Mix':'#EF9F27','Fléchettes':'#EF9F27',
    'Karaoke':'#1D9E75','Sport':'#1D9E75','Crush':'#1D9E75',
    'SBK':'#1D9E75','Comedy Club':'#1D9E75','Flash Tattoo':'#1D9E75','Poker':'#1D9E75',
    'Soirée':'#E24B4A','Divers':'#378ADD',
  }
  const colors = labels.map(l=>colorMap[byType[l].type]||'#888')
  if(charts['ads']) charts['ads'].destroy()
  charts['ads'] = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[{ label:'Budget (€)', data:values, backgroundColor:colors }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:9},maxRotation:45,autoSkip:false},grid:{display:false}},
        y:{ticks:{font:{size:10},callback:v=>v+'€'},grid:{color:'rgba(128,128,128,0.1)'}}
      }
    }
  })
}

// ── TAB PAGE ───────────────────────────────────────────────────────────────
function renderPageTab(data, pdv) {
  if(!pdv.fb_page_id||!pdv.fb_token) return `<div class="card"><div class="warn-box">Page Facebook non configurée.</div></div>`
  if(!data) return `<div class="card"><p class="empty">Aucune donnée page.</p></div>`
  if(data.error) return `<div class="card"><div class="warn-box"><strong>Erreur :</strong> ${data.error}</div></div>`
  return `
    <div class="kgrid">
      <div class="kc"><div class="kl">Abonnés (fans)</div><div class="kv">${fmt(data.fan_count)}</div></div>
      <div class="kc"><div class="kl">Followers</div><div class="kv">${fmt(data.followers_count)}</div></div>
      <div class="kc"><div class="kl">Nom de la page</div><div class="kv" style="font-size:14px">${data.name||'—'}</div></div>
    </div>
    <div class="card" style="margin-top:1rem">
      <div class="info-box">Les publications organiques nécessitent une validation Meta supplémentaire. Seules les métriques de la page sont disponibles.</div>
    </div>`
}

// ── TAB GMB ────────────────────────────────────────────────────────────────
function renderGMBTab(data, pdv) {
  if(!pdv.gmb_place_id) return `<div class="card"><div class="warn-box">Place ID Google non configuré.</div></div>`
  if(!pdv.gmb_api_key) return `<div class="card"><div class="warn-box">Clé API Google manquante.</div></div>`
  if(!data) return `<div class="card"><p class="empty">Aucune donnée GMB.</p></div>`
  if(data.error) return `<div class="card"><div class="warn-box"><strong>Erreur Google :</strong> ${data.error}</div></div>`
  const reviews = data.reviews||[]
  return `
    <div class="kgrid" style="margin-bottom:1.25rem">
      <div class="kc"><div class="kl">Note moyenne</div><div class="kv">${data.rating?data.rating.toFixed(1)+' / 5':'—'}</div></div>
      <div class="kc"><div class="kl">Nombre d'avis</div><div class="kv">${fmt(data.user_ratings_total)}</div></div>
      <div class="kc"><div class="kl">Sans réponse</div><div class="kv" style="color:var(--red)">${reviews.filter(r=>!r.reviewReply).length}</div></div>
    </div>
    <div class="card">
      <div class="ct">Avis récents</div>
      ${reviews.length===0?'<p class="empty">Aucun avis.</p>':
      reviews.slice(0,8).map(r=>{
        const stars='★'.repeat({'ONE':1,'TWO':2,'THREE':3,'FOUR':4,'FIVE':5}[r.rating]||0)+'☆'.repeat(5-({'ONE':1,'TWO':2,'THREE':3,'FOUR':4,'FIVE':5}[r.rating]||0))
        return `<div style="padding:10px;border-radius:var(--r);border:0.5px solid var(--bd);background:var(--bg3);margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500">${r.authorAttribution?.displayName||r.author_name||'Anonyme'}</span>
            <div style="display:flex;gap:6px;align-items:center">
              <span style="color:var(--amber);font-size:13px">${stars}</span>
              ${r.reviewReply?'<span class="badge bg">Répondu</span>':'<span class="badge br">Sans réponse</span>'}
            </div>
          </div>
          <div style="font-size:12px;color:var(--tx2)">${(r.text||r.originalText?.text||'(sans commentaire)').substring(0,200)}</div>
        </div>`
      }).join('')}
    </div>`
}

// ── CHANGE PERIOD ──────────────────────────────────────────────────────────
function changePeriod(pdvId, period) {
  currentPeriod = period
  renderDash(pdvId, false, period)
}

// ── INIT ───────────────────────────────────────────────────────────────────
buildSidebar(null)
</script>
</body>
</html>
